server {
    listen 80;

    # --- API requests → Flask backend ---
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Increase timeouts for long-running requests
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # --- WebSocket support (Flask-SocketIO) ---
    location /socket.io/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- All other requests → React frontend (Vite dev server) ---
    location / {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        # These two headers are needed for Vite's Hot Module Replacement (HMR)
        # Without them, code changes won't auto-refresh in the browser
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
